<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cool mobile page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2em;
        }
        
        .emoji {
            font-size: 4em;
            margin: 20px 0;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-20px);
            }
            60% {
                transform: translateY(-10px);
            }
        }
        
        .button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 10px;
        }
        
        .button:hover {
            transform: scale(1.05);
        }
        
        .counter {
            font-size: 2em;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
        }
        
        .color-box {
            width: 100px;
            height: 100px;
            margin: 20px auto;
            border-radius: 50%;
            background: #667eea;
            transition: all 0.3s;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 cool mobile page!</h1>
        <div class="emoji">🚀</div>
        
        <div class="counter" id="counter">0</div>
        <button class="button" onclick="increment()">click me!</button>
        
        <div class="color-box" id="colorBox" onclick="changeColor()"></div>
        <button class="button" onclick="showMessage()">show secret</button>
        
        <div id="secretMessage" class="hidden">
            <p style="color: #764ba2; font-size: 1.2em; margin: 20px 0;">
                🎊 you found the secret! 🎊
            </p>
        </div>
        
        <p style="color: #666; margin-top: 30px;">
            created by z for your phone ✨
        </p>
    </div>

    <script>
        let count = 0;
        
        function increment() {
            count++;
            document.getElementById('counter').textContent = count;
        }
        
        function changeColor() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#00f2fe'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('colorBox').style.background = randomColor;
        }
        
        function showMessage() {
            const message = document.getElementById('secretMessage');
            message.classList.toggle('hidden');
        }
    </script>
</body>
</html>
