<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lucky draw wheel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 600;
        }
        
        .wheel-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 0 auto 30px;
        }
        
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }
        
        .wheel-section {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: right bottom;
        }
        
        .wheel-text {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.2em;
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }
        
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff4757;
            z-index: 10;
            filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.3));
        }
        
        .spin-button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }
        
        .spin-button:hover {
            background: #ff3838;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
        }
        
        .spin-button:active {
            transform: translateY(0);
        }
        
        .spin-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .result.show {
            opacity: 1;
        }
        
        .result.winner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        @media (max-width: 480px) {
            .wheel-container {
                width: 280px;
                height: 280px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 lucky draw wheel</h1>
        
        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel">
                <!-- Wheel sections will be generated by JavaScript -->
            </div>
        </div>
        
        <button class="spin-button" id="spinButton" onclick="spin()">spin the wheel</button>
        
        <div class="result" id="result"></div>
    </div>

    <script>
        const prizes = [
            { name: "🎁 mystery prize", color: "#ff6b6b" },
            { name: "💰 $100", color: "#4ecdc4" },
            { name: "🎮 gaming console", color: "#45b7d1" },
            { name: "📱 smartphone", color: "#f9ca24" },
            { name: "🍕 pizza party", color: "#6c5ce7" },
            { name: "🎧 headphones", color: "#a29bfe" },
            { name: "💎 diamond", color: "#fd79a8" },
            { name: "🏆 trophy", color: "#00b894" }
        ];
        
        const wheel = document.getElementById('wheel');
        const spinButton = document.getElementById('spinButton');
        const result = document.getElementById('result');
        
        // Create wheel sections
        const sectionAngle = 360 / prizes.length;
        
        prizes.forEach((prize, index) => {
            const section = document.createElement('div');
            section.className = 'wheel-section';
            section.style.background = prize.color;
            section.style.transform = `rotate(${index * sectionAngle}deg)`;
            
            const text = document.createElement('div');
            text.className = 'wheel-text';
            text.textContent = prize.name;
            text.style.transform = `rotate(${sectionAngle / 2}deg)`;
            
            section.appendChild(text);
            wheel.appendChild(section);
        });
        
        let isSpinning = false;
        
        function spin() {
            if (isSpinning) return;
            
            isSpinning = true;
            spinButton.disabled = true;
            result.classList.remove('show', 'winner');
            
            // Calculate random rotation (multiple full rotations + random position)
            const minSpins = 5;
            const maxSpins = 8;
            const spins = Math.floor(Math.random() * (maxSpins - minSpins + 1)) + minSpins;
            const extraRotation = Math.floor(Math.random() * 360);
            const totalRotation = spins * 360 + extraRotation;
            
            // Apply rotation
            wheel.style.transform = `rotate(${totalRotation}deg)`;
            
            // Calculate winning prize
            const normalizedRotation = totalRotation % 360;
            const winningIndex = Math.floor((360 - normalizedRotation + sectionAngle / 2) / sectionAngle) % prizes.length;
            const winningPrize = prizes[winningIndex];
            
            // Show result after animation
            setTimeout(() => {
                result.textContent = `🎉 you won: ${winningPrize.name}! 🎉`;
                result.classList.add('show', 'winner');
                isSpinning = false;
                spinButton.disabled = false;
            }, 4000);
        }
    </script>
</body>
</html>
