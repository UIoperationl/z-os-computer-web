<!DOCTYPE html>
<html>
<head>
    <title>Roblox-like Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial, sans-serif;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>Use WASD to move</div>
        <div>Click to jump</div>
        <div>Mouse to look around</div>
    </div>
    <script src="game.js"></script>
</body>
</html>
